<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="url(#grad1)" />

  <!-- Inner circle -->
  <circle cx="60" cy="60" r="44" fill="#1e1b4b" />

  <!-- Sync arrows - circular -->
  <g fill="none" stroke="url(#grad2)" stroke-width="4" stroke-linecap="round">
    <!-- Top arrow arc -->
    <path d="M 40 35 A 30 30 0 0 1 85 55" />
    <!-- Top arrowhead -->
    <path d="M 80 45 L 85 55 L 75 58" stroke-linejoin="round" />

    <!-- Bottom arrow arc -->
    <path d="M 80 85 A 30 30 0 0 1 35 65" />
    <!-- Bottom arrowhead -->
    <path d="M 40 75 L 35 65 L 45 62" stroke-linejoin="round" />
  </g>

  <!-- Center dot / node -->
  <circle cx="60" cy="60" r="8" fill="url(#grad2)" />

  <!-- Small machine nodes -->
  <circle cx="35" cy="50" r="5" fill="#f472b6" />
  <circle cx="85" cy="70" r="5" fill="#34d399" />
  <circle cx="60" cy="88" r="5" fill="#fbbf24" />
</svg>
