<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f0a1f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0a1f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1" />
      <stop offset="50%" style="stop-color:#8b5cf6" />
      <stop offset="100%" style="stop-color:#a78bfa" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee" />
      <stop offset="100%" style="stop-color:#06b6d4" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bgGrad)" rx="12" />

  <!-- Decorative grid lines -->
  <g stroke="#374151" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="50" x2="800" y2="50" />
    <line x1="0" y1="100" x2="800" y2="100" />
    <line x1="0" y1="150" x2="800" y2="150" />
    <line x1="200" y1="0" x2="200" y2="200" />
    <line x1="400" y1="0" x2="400" y2="200" />
    <line x1="600" y1="0" x2="600" y2="200" />
  </g>

  <!-- Logo icon (simplified) -->
  <g transform="translate(60, 60)">
    <circle cx="40" cy="40" r="36" fill="#6366f1" opacity="0.2" />
    <circle cx="40" cy="40" r="28" fill="#1e1b4b" />
    <!-- Sync arrows -->
    <g fill="none" stroke="#22d3ee" stroke-width="3" stroke-linecap="round">
      <path d="M 25 28 A 20 20 0 0 1 58 38" />
      <path d="M 54 32 L 58 38 L 52 42" />
      <path d="M 55 52 A 20 20 0 0 1 22 42" />
      <path d="M 26 48 L 22 42 L 28 38" />
    </g>
    <circle cx="40" cy="40" r="5" fill="#22d3ee" />
    <!-- Machine nodes -->
    <circle cx="22" cy="32" r="3" fill="#f472b6" />
    <circle cx="58" cy="48" r="3" fill="#34d399" />
    <circle cx="40" cy="62" r="3" fill="#fbbf24" />
  </g>

  <!-- Main title -->
  <text x="160" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="url(#textGrad)">
    Claude Sync
  </text>

  <!-- Subtitle -->
  <text x="160" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#9ca3af">
    Cross-Machine Configuration Sync
  </text>

  <!-- Tagline -->
  <text x="160" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="url(#accentGrad)">
    Your Claude Code settings, everywhere. Safely.
  </text>

  <!-- Version badge -->
  <g transform="translate(640, 25)">
    <rect x="0" y="0" width="80" height="24" rx="12" fill="#22d3ee" opacity="0.2" />
    <text x="40" y="16" font-family="monospace" font-size="12" fill="#22d3ee" text-anchor="middle">v1.0.0</text>
  </g>

  <!-- Platform icons (simplified) -->
  <g transform="translate(640, 140)" fill="#6b7280">
    <text x="0" y="15" font-family="system-ui" font-size="11">🐧 Linux</text>
    <text x="0" y="35" font-family="system-ui" font-size="11">🪟 Windows</text>
    <text x="70" y="15" font-family="system-ui" font-size="11">🍎 macOS</text>
  </g>
</svg>
