# Floating windows
windowrulev2 = float, tag:floating-window
windowrulev2 = center, tag:floating-window
windowrulev2 = size 875 600, tag:floating-window

windowrulev2 = tag +floating-window, class:(org.omarchy.bluetui|org.omarchy.impala|org.omarchy.wiremix|org.omarchy.btop|org.omarchy.terminal|org.omarchy.bash|org.gnome.NautilusPreviewer|org.gnome.Evince|com.gabm.satty|Omarchy|About|TUI.float|imv|mpv)
windowrulev2 = tag +floating-window, class:(xdg-desktop-portal-gtk|sublime_text|DesktopEditors|org.gnome.Nautilus), title:^(Open.*Files?|Open [F|f]older.*|Save.*Files?|Save.*As|Save|All Files|.*wants to [open|save].*|[C|c]hoose.*)
windowrulev2 = float, class:org.gnome.Calculator

# Fullscreen screensaver (Hyprland 0.53.0+ syntax)
windowrule = match:class org.omarchy.screensaver, fullscreen on
windowrule = match:class org.omarchy.screensaver, float on
windowrule = match:class org.omarchy.screensaver, stay_focused on
windowrule = match:class org.omarchy.screensaver, animation none
windowrule = match:class org.omarchy.screensaver, idle_inhibit always

# No transparency on media windows
windowrulev2 = opacity 1 1, class:^(zoom|vlc|mpv|org.kde.kdenlive|com.obsproject.Studio|com.github.PintaProject.Pinta|imv|org.gnome.NautilusPreviewer)$

# Popped window rounding
windowrulev2 = rounding 8, tag:pop

# Prevent idle while open
windowrulev2 = idleinhibit always, tag:noidle