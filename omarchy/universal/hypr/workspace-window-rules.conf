# Window workspace assignment handled by hypr-smart-workspace daemon
# The daemon auto-categorizes apps via keyword matching on class/title
# and caches learned decisions at ~/.config/hypr/smart-workspace-cache.json
#
# Workspace layout (split-monitor-workspaces, 5 per monitor):
#   Laptop: L1=Dev, L2=Chat, L3=Work, L4=Games, L5=System
#   TV:     T1=Web, T2=Media, T3=Reference, T4=Files, T5=Extra

# ── Utility windows (not handled by daemon) ────
windowrule = float on, match:class ^(hypr-cheatsheet)$
windowrule = size 520 620, match:class ^(hypr-cheatsheet)$
windowrule = center on, match:class ^(hypr-cheatsheet)$
