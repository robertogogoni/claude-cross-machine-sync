# Automatic workspace assignment rules
# These rules will automatically place new windows in designated workspaces

# Browsers → Workspace 2 (Web)
windowrulev2 = workspace 2, class:^(firefox)$
windowrulev2 = workspace 2, class:^(Firefox)$
windowrulev2 = workspace 2, class:^(chromium)$
windowrulev2 = workspace 2, class:^(Chromium)$
windowrulev2 = workspace 2, class:^(brave)$
windowrulev2 = workspace 2, class:^(Brave-browser)$
windowrulev2 = workspace 2, class:^(Google-chrome)$

# Terminals & Dev Tools → Workspace 1 (Dev)
windowrulev2 = workspace 1, class:^(kitty)$
windowrulev2 = workspace 1, class:^(Alacritty)$
windowrulev2 = workspace 1, class:^(foot)$
windowrulev2 = workspace 1, class:^(ghostty)$
windowrulev2 = workspace 1, class:^(Ghostty)$
windowrulev2 = workspace 1, class:^(Code)$
windowrulev2 = workspace 1, class:^(VSCodium)$
windowrulev2 = workspace 1, class:^(Zed)$

# Beeper → Workspace 1 (always visible on main workspace)
windowrulev2 = workspace 1, class:^(BeeperTexts)$
windowrulev2 = workspace 1, class:^(beeper)$

# Communication → Workspace 3 (Chat)
windowrulev2 = workspace 3, class:^(Signal)$
windowrulev2 = workspace 3, class:^(WhatsApp)$
windowrulev2 = workspace 3, class:^(telegram)$
windowrulev2 = workspace 3, class:^(Telegram)$
windowrulev2 = workspace 3, class:^(discord)$
windowrulev2 = workspace 3, class:^(Discord)$
windowrulev2 = workspace 3, class:^(Slack)$

# Media → Workspace 4 (Media)
windowrulev2 = workspace 4, class:^(Spotify)$
windowrulev2 = workspace 4, class:^(vlc)$
windowrulev2 = workspace 4, class:^(mpv)$
windowrulev2 = workspace 4, class:^(rhythmbox)$

# Productivity → Workspace 5 (Work)
windowrulev2 = workspace 5, class:^(obsidian)$
windowrulev2 = workspace 5, class:^(Obsidian)$
windowrulev2 = workspace 5, class:^(Thunderbird)$
windowrulev2 = workspace 5, class:^(evolution)$

# Gaming → Workspace 7 (Games)
windowrulev2 = workspace 7, class:^(Steam)$
windowrulev2 = workspace 7, class:^(steam)$
windowrulev2 = workspace 7, class:^(lutris)$
windowrulev2 = workspace 7, class:^(Lutris)$
windowrulev2 = workspace 7, class:^(heroic)$
windowrulev2 = workspace 7, class:^(Heroic)$

# File Managers → Workspace 8 (Files)
windowrulev2 = workspace 8, class:^(nautilus)$
windowrulev2 = workspace 8, class:^(Nautilus)$
windowrulev2 = workspace 8, class:^(thunar)$
windowrulev2 = workspace 8, class:^(Thunar)$
windowrulev2 = workspace 8, class:^(dolphin)$
windowrulev2 = workspace 8, class:^(org.kde.dolphin)$

# System Monitors → Workspace 9 (System)
windowrulev2 = workspace 9, title:^(btop)$
windowrulev2 = workspace 9, title:^(htop)$
windowrulev2 = workspace 9, title:^(nvtop)$