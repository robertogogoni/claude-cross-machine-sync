# Workspace window assignment rules — Hyprland 0.53+ syntax
# Last updated: 2026-04-11 (restored after smart-daemon approach abandoned)
#
# Workspace layout:
#   1=Dev  2=Web  3=Chat  4=Media  5=Work  7=Games  8=Files  9=System

# ── Browsers → Workspace 2 (Web) ──────────────────────────────────────
windowrule = workspace 2, match:class ^(Google-chrome-canary|Google-chrome|chromium|Chromium|brave-browser|Brave-browser|firefox|Firefox)$

# ── Dev tools → Workspace 1 (Dev) ─────────────────────────────────────
windowrule = workspace 1, match:class ^(com.mitchellh.ghostty|Alacritty|kitty|foot|WarpTerminal|Code|VSCodium|Zed|zed|cursor)$

# ── Claude Desktop → Workspace 1 (Dev) ────────────────────────────────
windowrule = workspace 1, match:class ^(Claude)$

# ── Beeper → Workspace 3 (Chat) ───────────────────────────────────────
windowrule = workspace 3, match:class ^(Beeper|BeeperTexts|beeper)$

# ── Communication → Workspace 3 (Chat) ────────────────────────────────
windowrule = workspace 3, match:class ^(Signal|WhatsApp|telegram-desktop|TelegramDesktop|discord|Discord|Slack)$

# ── Media → Workspace 4 (Media) ───────────────────────────────────────
windowrule = workspace 4, match:class ^(Spotify|spotify|vlc|mpv|rhythmbox|stremio)$

# ── Productivity → Workspace 5 (Work) ─────────────────────────────────
windowrule = workspace 5, match:class ^(obsidian|Obsidian|thunderbird|Thunderbird|evolution)$

# ── Gaming → Workspace 7 (Games) ──────────────────────────────────────
windowrule = workspace 7, match:class ^(Steam|steam|lutris|Lutris|heroic|Heroic)$

# ── File Managers → Workspace 8 (Files) ───────────────────────────────
windowrule = workspace 8, match:class ^(nautilus|Nautilus|thunar|Thunar|org.gnome.Nautilus)$

# ── System Monitors → Workspace 9 (System) ────────────────────────────
windowrule = workspace 9, match:title ^(btop|htop|nvtop)$

# ── Utility windows (float, no workspace assignment) ──────────────────
windowrule = float on, match:class ^(hypr-cheatsheet)$
windowrule = size 520 620, match:class ^(hypr-cheatsheet)$
windowrule = center on, match:class ^(hypr-cheatsheet)$
