# Automatic workspace assignment rules
# These rules will automatically place new windows in designated workspaces
# Hyprland 0.53.0+ syntax

# Browsers → Workspace 2 (Web)
windowrule = workspace 2, match:class (firefox|Firefox|chromium|Chromium|brave|Brave-browser|Google-chrome)

# Terminals & Dev Tools → Workspace 1 (Dev)
windowrule = workspace 1, match:class (kitty|Alacritty|foot|ghostty|Ghostty|Code|VSCodium|Zed)

# Beeper → Workspace 1 (always visible on main workspace)
windowrule = workspace 1, match:class (Beeper|BeeperTexts|beeper)

# Communication → Workspace 3 (Chat)
windowrule = workspace 3, match:class (Signal|WhatsApp|telegram|Telegram|discord|Discord|Slack)

# Media → Workspace 4 (Media)
windowrule = workspace 4, match:class (Spotify|vlc|mpv|rhythmbox)

# Productivity → Workspace 5 (Work)
windowrule = workspace 5, match:class (obsidian|Obsidian|Thunderbird|evolution)

# Gaming → Workspace 7 (Games)
windowrule = workspace 7, match:class (Steam|steam|lutris|Lutris|heroic|Heroic)

# File Managers → Workspace 8 (Files)
windowrule = workspace 8, match:class (nautilus|Nautilus|thunar|Thunar|dolphin|org.kde.dolphin)

# System Monitors → Workspace 9 (System)
windowrule = workspace 9, match:title (btop|htop|nvtop)
