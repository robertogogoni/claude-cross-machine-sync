# User environment variables for Hyprland
# These override the Omarchy defaults

# Smaller cursor size (default is 24)
env = XCURSOR_SIZE,18
env = HYPRCURSOR_SIZE,18

# Integer scaling only — keeps all rendering pixel-perfect on 1366x768
env = GDK_SCALE,1
env = GDK_DPI_SCALE,0.85

# Qt: integer scale factor (no fractional blur) + DPI override for compact UI
env = QT_SCALE_FACTOR,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,0
env = QT_WAYLAND_FORCE_DPI,80

# Default browser
env = BROWSER,google-chrome-canary

# Intel Haswell VA-API driver (hardware video decode)
env = LIBVA_DRIVER_NAME,i965

# Workarounds removed 2026-04-05:
# - AQ_NO_MODIFIERS=1 (LINEAR buffers) — removed, tiled buffers + FBC now active
# - AQ_NO_ATOMIC=1 (legacy DRM) — removed, atomic modesetting now active
