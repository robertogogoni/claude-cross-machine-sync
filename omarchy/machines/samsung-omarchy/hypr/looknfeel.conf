# Change the default Omarchy look'n'feel

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    # No gaps between windows or borders
    # gaps_in = 0
    # gaps_out = 0
    # border_size = 0

    # Use master layout instead of dwindle
    # layout = master
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    # Use round window corners
    # rounding = 8
}

# https://wiki.hypr.land/Configuring/Variables/#layout
layout {
    # Avoid overly wide single-window layouts on wide screens
    # single_window_aspect_ratio = 1 1
}

# Smaller UI elements for group bars
group {
    groupbar {
        font_size = 10
        height = 18
    }
}

# Window swallowing — terminal disappears when it spawns a GUI app, returns when app closes
misc {
    enable_swallow = true
    swallow_regex = ^(com\.mitchellh\.ghostty|ghostty|Ghostty|kitty|Alacritty|foot|wezterm)$

}

# Render optimizations for Intel HD 4400 (Haswell) dual display
# Total pixel load: eDP(1366x768) + HDMI(1920x1080) = 3.1M pixels @ 60fps
render {
    # Bypass compositor for fullscreen apps (video, games) - direct GPU scanout
    direct_scanout = true
}

# Disable blur — too expensive at 1080p on HD 4400 shared memory bandwidth
# Was: passes=1 (reduced from omarchy default 2), still caused frame drops
decoration {
    blur {
        enabled = false
    }
    # Stronger shadow for visibility at 1080p TV distance (omarchy default: range=2)
    shadow {
        range = 6
    }
}

# Faster animations — less time spent re-rendering transition frames
animations {
    animation = windows, 1, 3, easeOutQuint, popin 87%
    animation = windowsIn, 1, 2.5, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1, linear, popin 87%
    animation = fade, 1, 2, quick
    animation = layers, 1, 2.5, easeOutQuint
    animation = layersIn, 1, 2.5, easeOutQuint, fade
    animation = layersOut, 1, 1, linear, fade
}
