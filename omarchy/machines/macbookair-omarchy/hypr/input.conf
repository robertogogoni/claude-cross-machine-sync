# Control your input devices
# See https://wiki.hypr.land/Configuring/Variables/#input
input {
  # US International with dead keys (cedilla via XCompose + fcitx5)
  # BR layout removed — it's for ABNT2 physical keyboards only
  kb_layout = us
  kb_variant = intl
  kb_options = compose:ralt


  # Change speed of keyboard repeat
  repeat_rate = 40
  repeat_delay = 600

  # Start with numlock on by default
  numlock_by_default = true

  # Increase sensitivity for mouse/trackpad (default: 0)
  # sensitivity = 0.35

  # Mouse scroll speed
  scroll_factor = 1.0
  sensitivity = -0.6
  accel_profile = flat

  touchpad {
    natural_scroll = true
    tap-to-click = true
    drag_lock = true
    disable_while_typing = true
    scroll_factor = 0.8
  } 

} 

# Device-specific configuration for Magic Mouse
# Device-specific configuration for Magic Mouse
device {
  name = Apple Inc. Magic Mouse 2
  sensitivity = -0.8
  accel_profile = flat
  scroll_factor = 1.2
} 