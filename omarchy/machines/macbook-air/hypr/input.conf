# MacBook Air input configuration
# Apple internal keyboard and Force Touch trackpad

input {
  # Keyboard layouts: US International + Brazilian Portuguese
  # Toggle with Alt+Shift
  kb_layout = us,br
  kb_variant = intl,
  kb_options = grp:alt_shift_toggle

  # Keyboard repeat speed
  repeat_rate = 40
  repeat_delay = 600

  # Start with numlock on
  numlock_by_default = true

  # Mouse/trackpad sensitivity (negative = slower)
  sensitivity = -0.6
  accel_profile = flat
  scroll_factor = 1.0

  # Apple Force Touch Trackpad settings
  touchpad {
    natural_scroll = true
    tap-to-click = true
    drag_lock = true
    disable_while_typing = true
    scroll_factor = 0.8
  }
}

# Apple Magic Mouse 2 (when connected via Bluetooth)
device {
  name = Apple Inc. Magic Mouse 2
  sensitivity = -0.8
  accel_profile = flat
  scroll_factor = 1.2
}
