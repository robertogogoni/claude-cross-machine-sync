# Change the default Omarchy look'n'feel

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
  # No gaps between windows
  # gaps_in = 0
  # gaps_out = 0

  # Use master layout instead of dwindle
  # layout = master
} 

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
  # Use round window corners
  # rounding = 8

  # Disable shadows for better performance on Intel HD 6000
  shadow {
    enabled = false
  } 

  # Performance optimizations for Intel HD Graphics 6000
  blur {
    enabled = false # Disabled for maximum performance
    size = 3 # Lower blur radius for better performance
    passes = 1 # Single pass to reduce GPU load
    new_optimizations = true
  } 
} 

# Animation optimizations for older hardware
animations {
  enabled = true

  bezier = smoothOut, 0.36, 0, 0.66, -0.56
  bezier = smoothIn, 0.25, 1, 0.5, 1
  bezier = linear, 0, 0, 1, 1

  animation = windows, 1, 4, smoothIn, slide
  animation = windowsOut, 1, 4, smoothOut, slide
  animation = border, 1, 5, linear
  animation = fade, 1, 5, smoothIn
  animation = workspaces, 1, 4, smoothIn, slide
} 

# Performance settings
misc {
  vfr = true # Variable frame rate - save power when idle
  vrr = 0 # VRR off for Intel iGPU compatibility
} 

# Cursor settings
cursor {
  no_hardware_cursors = false
  # default_monitor =
  zoom_factor = 1.0
  zoom_rigid = false
} 