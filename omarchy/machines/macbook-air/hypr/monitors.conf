# MacBook Air (MacBookAir7,2) display configuration
# 13" 1440x900 native display at eDP-1

# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors: hyprctl monitors

# MacBook Air 13" display - use preferred resolution at 1x scale
# (Native is 1440x900, but Hyprland picks best resolution)
env = GDK_SCALE,1.0
monitor = eDP-1,preferred,auto,1.0

# For external monitors (if connected):
# monitor = HDMI-A-1,preferred,auto-right,1.0
# monitor = DP-1,preferred,auto-right,1.0
