# MacBook Air specific keybindings
# These bindings only work on MacBook Air hardware

# Keyboard backlight controls (F5 = decrease, F6 = increase) with OSD
# Only MacBook Air has XF86KbdBrightness keys
bindeld = , XF86KbdBrightnessDown, Keyboard backlight down, exec, ~/bin/kbd-backlight down
bindeld = , XF86KbdBrightnessUp, Keyboard backlight up, exec, ~/bin/kbd-backlight up

# Keyboard layout switcher - uses Apple internal keyboard device name
# Other machines will have different device names
bindd = SUPER, SPACE, Switch keyboard layout, exec, hyprctl switchxkblayout apple-inc.-apple-internal-keyboard-/-trackpad next
