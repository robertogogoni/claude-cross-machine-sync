# Chrome Canary flags for UI scaling and Wayland support
# This file is automatically loaded by /usr/bin/google-chrome-canary

# UI Scaling - reduce UI elements to 75% (adjust between 0.75-0.9 as needed)
--force-device-scale-factor=0.75

# Wayland support flags
--enable-features=UseOzonePlatform
--ozone-platform=wayland
--enable-wayland-ime

# Performance: disable CPU-heavy field trial experiments
--disable-features=Vulkan,WebContentsForceDark,HistoryEmbeddings,HistoryEmbeddingsAnswers,BrowsingHistoryActorIntegrationM1,BrowsingHistoryActorIntegrationM2,BrowsingHistorySimilarVisitsGrouping

# Performance: GPU rasterization and threading
--enable-gpu-rasterization
--enable-zero-copy
--num-raster-threads=4

# Permission/security relaxation flags
--autoplay-policy=no-user-gesture-required
--disable-popup-blocking
--allow-running-insecure-content
